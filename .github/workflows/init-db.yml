name: Initialize Database

on:
  workflow_dispatch:  # 只在手动触发时运行

env:
  NODE_VERSION: '20'
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

jobs:
  init-db:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install worker dependencies
        working-directory: ./worker
        run: npm ci
      
      - name: Initialize Database
        run: |
          cd worker
          echo "Applying schema to D1..."
          npx wrangler d1 execute love-space-db --file=./schema.sql --remote
          
          echo "Applying cycle health migration..."
          npx wrangler d1 execute love-space-db --file=./migrations/cycle-health.sql --remote
          
          echo "✅ Database initialized!"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      
      - name: Database Init Summary
        run: |
          echo "## Database Initialized" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Database schema applied successfully!" >> $GITHUB_STEP_SUMMARY
