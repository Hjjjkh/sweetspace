# Frontend Configuration
[build]
  command = "npm run build"
  publish = "dist"
  directory = "frontend"

# Environment variables for Pages
[site]
  bucket = "./dist"

# Routing - all API calls to Worker
[[redirects]]
  from = "/api/*"
  to = "https://sweetspace.248851185.workers.dev/api/:splat"
  status = 200
  force = true

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for security and caching
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
