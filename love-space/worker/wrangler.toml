name = "love-space-worker"
main = "src/index.js"
compatibility_date = "2024-01-01"

# D1 Database 绑定
[[d1_databases]]
binding = "DB"
database_name = "love-space-db"
database_id = "YOUR_D1_DATABASE_ID"

# R2 Storage Bucket 绑定
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "love-space-media"

# Cron Trigger 配置
[triggers]
crons = ["0 0 * * *"]

# 环境变量
[vars]
ENVIRONMENT = "production"
MAX_FILE_SIZE = "10485760"
ALLOWED_TYPES = "image/jpeg,image/png,image/gif,image/webp,video/mp4,video/quicktime"

# 开发环境配置
[dev]
port = 8787
local_protocol = "http"
