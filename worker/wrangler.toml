name = "sweetspace"
main = "src/index.js"
compatibility_date = "2024-01-01"

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "love-space-db"
database_id = "YOUR_DATABASE_ID_HERE"

# R2 Storage binding (optional - for gallery)
# [[r2_buckets]]
# binding = "BUCKET"
# bucket_name = "love-space-photos"

# Environment variables
[vars]
ENVIRONMENT = "production"

# Development configuration
[dev]
port = 8787
local_protocol = "http"

# Cron triggers (for daily questions)
# [[triggers]]
# crons = ["0 0 * * *"]
