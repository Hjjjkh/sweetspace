name = "sweetspace"
main = "src/index.js"
compatibility_date = "2024-01-01"

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "love-space-db"
database_id = "0b02e937-7109-4369-aa59-a2a2e8545608"

# R2 Storage binding (用于相册文件存储)
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "love-space-photos"
# 如果 bucket 不存在，先创建：npx wrangler r2 bucket create love-space-photos

# Environment variables
[vars]
ENVIRONMENT = "production"
MAX_FILE_SIZE = "10485760"
ALLOWED_TYPES = "image/jpeg,image/png,image/gif,image/webp,video/mp4,video/quicktime"

# AI Configuration
# OPENROUTER_API_KEY 需要使用 Cloudflare Secrets 配置：npx wrangler secret put OPENROUTER_API_KEY
AI_MODEL = "openrouter/elephant-alpha"
AI_RATE_LIMIT = "100"
AI_CACHE_DAYS = "30"
AI_TIMEOUT_MS = "30000"

# Development configuration
[dev]
port = 8787
local_protocol = "http"

# 本地开发使用本地 R2 和 D1
[[dev.d1_databases]]
binding = "DB"
database_name = "love-space-db-local"

[[dev.r2_buckets]]
binding = "BUCKET"
bucket_name = "love-space-photos-local"
