name = "sweetspace"
main = "src/index.js"
compatibility_date = "2024-01-01"

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "love-space-db"
# database_id 在 Cloudflare Dashboard 配置

# R2 Storage binding (用于相册文件存储)
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "love-space-photos"
# 如果 bucket 不存在，先创建：npx wrangler r2 bucket create love-space-photos

# Environment variables
[vars]
ENVIRONMENT = "production"
MAX_FILE_SIZE = "10485760"
ALLOWED_TYPES = "image/jpeg,image/png,image/gif,image/webp,video/mp4,video/quicktime"

# AI Configuration
OPENROUTER_API_KEY = "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"
AI_MODEL = "openrouter/elephant-alpha"
AI_RATE_LIMIT = "100"
AI_CACHE_DAYS = "30"
AI_TIMEOUT_MS = "30000"

# Development configuration
[dev]
port = 8787
local_protocol = "http"

# 本地开发使用本地 R2 和 D1
[[dev.d1_databases]]
binding = "DB"
database_name = "love-space-db-local"

[[dev.r2_buckets]]
binding = "BUCKET"
bucket_name = "love-space-photos-local"
